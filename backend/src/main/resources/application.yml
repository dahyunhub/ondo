server:
  # 로컬·컨테이너 공통 listen 포트(8080 → 8090, 다른 프로젝트와 충돌 회피)
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: ondo
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    # 로컬(non-Docker) 기본값은 3307 — 호스트 3306 은 외부 MySQL 이 점유. Docker app 은 compose 의 DB_URL(mysql:3306) 로 override.
    url: ${DB_URL:jdbc:mysql://localhost:3307/ondo?serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:ondo}
    password: ${DB_PASSWORD:ondo}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # Flyway 가 스키마 정본. Hibernate 는 검증만 수행한다.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

ondo:
  jwt:
    # HS256 → 최소 32바이트(256bit) 키. 운영은 반드시 env 로 주입.
    secret: ${JWT_SECRET:dev-only-secret-please-change-me-0123456789abcdef}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  ai:
    # 외부 LLM(OpenAI). 키·모델은 운영 시 env 주입. base-url 은 호스트만(경로는 코드에서 /v1/chat/completions).
    base-url: ${AI_BASE_URL:https://api.openai.com}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-4.1}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:20}
    max-retries: ${AI_MAX_RETRIES:2}
  report:
    # 월말 자동 개인평가(FR-9) 실행 주기. Spring cron — L=말일. 기본 매월 말일 02:00(zone=UTC, 코드에서 지정).
    monthly-cron: ${REPORT_MONTHLY_CRON:0 0 2 L * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    properties:
      hibernate:
        show_sql: true

logging:
  level:
    com.ondo: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    properties:
      hibernate:
        show_sql: false

logging:
  level:
    com.ondo: INFO
