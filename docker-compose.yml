# 온도 프로덕션 스택 (Epic 5): web(nginx) + app(Spring) + mysql.
# 시크릿은 .env 로 주입(.env 는 커밋 금지). 아래 ${VAR:-default} 는 데모 편의용 기본값 — 운영은 반드시 override.
services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    # 호스트 3306 은 다른 인스턴스(homebrew mysql@8.4 · practice1 컨테이너)가 점유 →
    # 로컬(non-Docker) 개발에서 온도 DB 로 붙으려면 별도 포트로 게시한다. 컨테이너 내부는 그대로 3306.
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ondo
      MYSQL_USER: ${DB_USERNAME:-ondo}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ondo}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ondo-mysql-data:/var/lib/mysql

  app:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:mysql://mysql:3306/ondo?serverTimezone=UTC&characterEncoding=UTF-8
      DB_USERNAME: ${DB_USERNAME:-ondo}
      DB_PASSWORD: ${DB_PASSWORD:-ondo}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-please-change-me-0123456789abcdef}
      # AI(OpenAI) — 미설정 시 일반 화면은 정상, AI 일지·평가만 비활성.
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-5.4-mini}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com}
    expose:
      - "8090"
    ports:
      # 운영에선 web(nginx)만 외부 노출 — app 직접 노출은 디버그용(기본 게시).
      - "${APP_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  web:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    healthcheck:
      # 컨테이너 내부 localhost 가 IPv6(::1)로 풀려 refused 되는 것 방지 → IPv4 명시.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  ondo-mysql-data:
