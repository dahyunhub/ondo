<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자람 · 유치원 교사 업무 도구 — 디자인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="jaram-ui.jsx"></script>
<script type="text/babel" src="screens-system.jsx"></script>
<script type="text/babel" src="screens-memo.jsx"></script>
<script type="text/babel" src="screens-journal.jsx"></script>
<script type="text/babel" src="screens-timeline.jsx"></script>
<script type="text/babel" src="screens-misc.jsx"></script>
<script type="text/babel" src="screens-extra.jsx"></script>
<script type="text/babel" src="screens-auth.jsx"></script>
<script type="text/babel" src="screens-register.jsx"></script>
<script type="text/babel" src="screens-account.jsx"></script>

<script type="text/babel">
const PH = { w: 414, h: 836 };       // 폰 프레임
const DT = { w: 1180, h: 804 };      // 데스크톱 윈도우 (본문 760 + 타이틀바 44)

function App() {
  return (
    <DesignCanvas>
      <DCSection id="tokens" title="1 · 디자인 토큰" subtitle="컬러 · 타이포 · 라운딩 · 그림자 · 간격">
        <DCArtboard id="token-sheet" label="디자인 토큰 시트" width={1180} height={812} style={{ borderRadius: 18 }}><TokenSheet /></DCArtboard>
      </DCSection>

      <DCSection id="components" title="2 · 컴포넌트 라이브러리" subtitle="버튼 · 칩 · 카드 · 입력 · 피드백 · 상태">
        <DCArtboard id="comp-lib" label="컴포넌트" width={1180} height={648} style={{ borderRadius: 18 }}><ComponentLib /></DCArtboard>
      </DCSection>

      <DCSection id="auth" title="로그인 · 회원가입" subtitle="한 페이지 · 상단 탭으로 전환 (클릭 가능) · 카카오·구글 소셜 로그인">
        <DCArtboard id="auth-m-login" label="모바일 · 로그인" width={PH.w} height={PH.h}><AuthMobile initial="login" /></DCArtboard>
        <DCArtboard id="auth-m-signup" label="모바일 · 회원가입" width={PH.w} height={PH.h}><AuthMobile initial="signup" /></DCArtboard>
        <DCArtboard id="auth-d-login" label="데스크톱 · 로그인" width={DT.w} height={664}><AuthDesktop initial="login" /></DCArtboard>
        <DCArtboard id="auth-d-signup" label="데스크톱 · 회원가입" width={DT.w} height={664}><AuthDesktop initial="signup" /></DCArtboard>
      </DCSection>

      <DCSection id="onboard" title="처음 시작 · 아이 등록 (온보딩)" subtitle="첫 사용 시 우리 반 아이들 등록 · 사진·이름·생년월일·성별">
        <DCArtboard id="ob-m" label="모바일" width={PH.w} height={PH.h}><OnboardMobile /></DCArtboard>
        <DCArtboard id="ob-d" label="데스크톱" width={DT.w} height={704}><OnboardDesktop /></DCArtboard>
      </DCSection>

      <DCSection id="s0" title="화면 0 · 로그인 · 반 선택" subtitle="따뜻한 환영 · 담당 반 선택 (학년도 표시 · 작년/올해)">
        <DCArtboard id="s0-m" label="모바일" width={PH.w} height={PH.h}><LoginMobile /></DCArtboard>
        <DCArtboard id="s0-d" label="데스크톱" width={DT.w} height={664}><LoginDesktop /></DCArtboard>
      </DCSection>

      <DCSection id="s1" title="화면 1 · 홈 (오늘의 메모)" subtitle="인사 · AI 일지 쓰기 진입 · 오늘 메모 피드">
        <DCArtboard id="s1-m" label="모바일 · FAB" width={PH.w} height={PH.h}><HomeMobile /></DCArtboard>
        <DCArtboard id="s1-d" label="데스크톱 · 사이드바" width={DT.w} height={DT.h}><HomeDesktop /></DCArtboard>
      </DCSection>

      <DCSection id="s2" title="화면 2 · 빠른 메모 입력 ⭐" subtitle="아이 선택 → 내용 입력(놀이·의사소통·수업태도) → 저장 · 영역은 밤에 자동 분류(교사 입력 없음)">
        <DCArtboard id="s2-m1" label="모바일 · 입력" width={PH.w} height={PH.h}><MemoMobile /></DCArtboard>
        <DCArtboard id="s2-m-empty" label="모바일 · 저장 비활성(빈 입력)" width={PH.w} height={PH.h}><MemoMobile empty /></DCArtboard>
        <DCArtboard id="s2-m-modal" label="모바일 · 입력칸 확대 모달" width={PH.w} height={PH.h}><MemoMobile initialField={0} /></DCArtboard>
        <DCArtboard id="s2-m2" label="모바일 · 저장 토스트" width={PH.w} height={PH.h}><MemoMobile saved /></DCArtboard>
        <DCArtboard id="s2-d" label="데스크톱 · 전체 명단" width={DT.w} height={DT.h}><MemoDesktop /></DCArtboard>
        <DCArtboard id="s2-d-modal" label="데스크톱 · 입력칸 확대 모달" width={DT.w} height={DT.h}><MemoDesktop initialField={0} /></DCArtboard>
      </DCSection>

      <DCSection id="journalhub" title="메뉴 · 일지·분석 (허브)" subtitle="A 한 아이 분석 / B 오늘 전체 분석 진입 · 최근 만든 일지 목록">
        <DCArtboard id="jh-m" label="모바일" width={PH.w} height={PH.h}><JournalHubMobile /></DCArtboard>
        <DCArtboard id="jh-d" label="데스크톱" width={DT.w} height={DT.h}><JournalHubDesktop /></DCArtboard>
      </DCSection>

      <DCSection id="s3" title="화면 3 · 일지 생성 ⭐" subtitle="로딩 · 초안 · 에러 · 재분석/덮어쓰기 확인 · 동시 분석 제한">
        <DCArtboard id="s3-m-load" label="모바일 · 생성 중" width={PH.w} height={PH.h}><JournalMobile state="loading" /></DCArtboard>
        <DCArtboard id="s3-m-draft" label="모바일 · 초안 검토" width={PH.w} height={PH.h}><JournalMobile state="draft" /></DCArtboard>
        <DCArtboard id="s3-m-err" label="모바일 · 에러 (안심)" width={PH.w} height={PH.h}><JournalMobile state="error" /></DCArtboard>
        <DCArtboard id="s3-m-re" label="모바일 · 재분석 안내" width={PH.w} height={PH.h}><JournalMobile state="reanalyze" /></DCArtboard>
        <DCArtboard id="s3-m-ow" label="모바일 · 덮어쓰기 확인" width={PH.w} height={PH.h}><JournalMobile state="overwrite" /></DCArtboard>
        <DCArtboard id="s3-m-busy" label="모바일 · 동시 분석 제한" width={PH.w} height={PH.h}><JournalMobile state="busy" /></DCArtboard>
        <DCArtboard id="s3-d-draft" label="데스크톱 · 초안 (2단)" width={DT.w} height={DT.h}><JournalDesktop state="draft" /></DCArtboard>
        <DCArtboard id="s3-d-load" label="데스크톱 · 생성 중" width={DT.w} height={DT.h}><JournalDesktop state="loading" /></DCArtboard>
        <DCArtboard id="s3-d-err" label="데스크톱 · 에러" width={DT.w} height={DT.h}><JournalDesktop state="error" /></DCArtboard>
        <DCArtboard id="s3-d-ow" label="데스크톱 · 덮어쓰기 확인" width={DT.w} height={DT.h}><JournalDesktop state="overwrite" /></DCArtboard>
        <DCArtboard id="s3-d-busy" label="데스크톱 · 동시 분석 제한" width={DT.w} height={DT.h}><JournalDesktop state="busy" /></DCArtboard>
      </DCSection>

      <DCSection id="s4" title="화면 4 · 아이별 타임라인 ⭐" subtitle="개인 관찰평가 이력(수동·자동) · 영역 필터(미분류 포함) · 영역 인라인 수정 · 빈 상태">
        <DCArtboard id="s4-m" label="모바일" width={PH.w} height={PH.h}><TimelineMobile /></DCArtboard>
        <DCArtboard id="s4-m-edit" label="모바일 · 영역 인라인 수정" width={PH.w} height={PH.h}><TimelineMobile editFlatIndex={0} /></DCArtboard>
        <DCArtboard id="s4-m-eval" label="모바일 · 개인평가 생성(기간)" width={PH.w} height={PH.h}><TimelineMobile evalModal /></DCArtboard>
        <DCArtboard id="s4-m-empty" label="모바일 · 빈 타임라인" width={PH.w} height={PH.h}><TimelineMobile empty /></DCArtboard>
        <DCArtboard id="s4-d" label="데스크톱" width={DT.w} height={DT.h}><TimelineDesktop /></DCArtboard>
        <DCArtboard id="s4-d-edit" label="데스크톱 · 영역 인라인 수정" width={DT.w} height={DT.h}><TimelineDesktop editFlatIndex={0} /></DCArtboard>
        <DCArtboard id="s4-d-eval" label="데스크톱 · 개인평가 생성(기간)" width={DT.w} height={DT.h}><TimelineDesktop evalModal /></DCArtboard>
      </DCSection>

      <DCSection id="s5" title="화면 5 · 아이 목록 (반 전체)" subtitle="가나다순 · 아바타 · 최근 기록 수 · '아이 등록하기' 진입 · 탭하면 타임라인으로">
        <DCArtboard id="s5-m" label="모바일" width={PH.w} height={PH.h}><ChildListMobile /></DCArtboard>
        <DCArtboard id="s5-d" label="데스크톱" width={DT.w} height={DT.h}><ChildListDesktop /></DCArtboard>
      </DCSection>

      <DCSection id="addchild" title="아이 등록·관리 (학기 중 추가 · 수정 · 보존형 삭제)" subtitle="이사 온 새 친구 등록 · 실명·생년월일 수정 · 명단 숨김(기록 보존)">
        <DCArtboard id="add-m" label="모바일 · 새 친구 등록" width={PH.w} height={PH.h}><AddChildMobile /></DCArtboard>
        <DCArtboard id="add-d" label="데스크톱 · 새 친구 등록" width={DT.w} height={DT.h}><AddChildDesktop /></DCArtboard>
        <DCArtboard id="edit-m" label="모바일 · 정보 수정" width={PH.w} height={PH.h}><EditChildMobile /></DCArtboard>
        <DCArtboard id="edit-m-del" label="모바일 · 보존형 삭제 확인" width={PH.w} height={PH.h}><EditChildMobile delModal /></DCArtboard>
        <DCArtboard id="edit-d" label="데스크톱 · 정보 수정" width={DT.w} height={DT.h}><EditChildDesktop /></DCArtboard>
        <DCArtboard id="edit-d-del" label="데스크톱 · 보존형 삭제 확인" width={DT.w} height={DT.h}><EditChildDesktop delModal /></DCArtboard>
      </DCSection>

      <DCSection id="mypage" title="메뉴 · 마이" subtitle="프로필 · 설정 메뉴의 '반 전환하기' 클릭 → 맡았던 반 선택 모달 · 설정">
        <DCArtboard id="my-m" label="모바일" width={PH.w} height={PH.h}><MyPageMobile /></DCArtboard>
        <DCArtboard id="my-m-modal" label="모바일 · 반 전환 모달" width={PH.w} height={PH.h}><MyPageMobile initialOpen /></DCArtboard>
        <DCArtboard id="my-m2" label="모바일 · 작년 반 보는 중" width={PH.w} height={PH.h}><MyPageMobile initialIdx={1} /></DCArtboard>
        <DCArtboard id="my-d" label="데스크톱" width={DT.w} height={DT.h}><MyPageDesktop /></DCArtboard>
        <DCArtboard id="my-d-modal" label="데스크톱 · 반 전환 모달" width={DT.w} height={DT.h}><MyPageDesktop initialOpen /></DCArtboard>
        <DCArtboard id="my-d2" label="데스크톱 · 작년 반 보는 중" width={DT.w} height={DT.h}><MyPageDesktop initialIdx={1} /></DCArtboard>
      </DCSection>

      <DCSection id="empty" title="상태 · 빈 화면 (Empty State)" subtitle="따뜻한 스폿 일러스트 + 첫 행동 유도">
        <DCArtboard id="empty-tl" label="빈 타임라인 · 모바일" width={PH.w} height={PH.h}><EmptyTimelineMobile /></DCArtboard>
        <DCArtboard id="empty-home" label="빈 홈 · 데스크톱" width={DT.w} height={DT.h}><EmptyHomeDesktop /></DCArtboard>
      </DCSection>

      <DCSection id="modal" title="피드백 · 재분석 확인 모달" subtitle="“오늘 분석 내용이 이미 있어요. 다시 만들까요?”">
        <DCArtboard id="modal-m" label="모바일" width={PH.w} height={PH.h}><ReanalyzeModal compact /></DCArtboard>
        <DCArtboard id="modal-d" label="데스크톱" width={DT.w} height={DT.h}><ReanalyzeModal /></DCArtboard>
      </DCSection>

      <DCSection id="responsive" title="반응형 한눈에 비교" subtitle="같은 AI 일지 화면 · 🌞낮 모바일 ↔ 🌙밤 데스크톱 · 하나의 디자인 시스템">
        <DCArtboard id="resp" label="모바일 ↔ 데스크톱" width={1320} height={760} style={{ borderRadius: 18 }}><ResponsiveCompare /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
