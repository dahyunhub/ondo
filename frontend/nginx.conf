# 온도 프론트 서빙(Story 5.2): SPA 정적 + /api 리버스 프록시(같은 origin → 기존 상대경로 /api 그대로 동작).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 프로필 사진 업로드(서버 2MB 제한)에 여유를 둔 본문 한도.
    client_max_body_size 4m;

    # SPA: 정적 파일 우선, 없으면 index.html 로 폴백(Vue history 라우팅).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: 백엔드(app:8090)로 프록시. /api 경로 그대로 전달.
    location /api/ {
        proxy_pass http://app:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 정적 자산 캐시(해시 파일명 → 장기 캐시 안전).
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
